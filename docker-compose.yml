services:
  redis:
    image: redis:7-alpine
    container_name: malaria_redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - malaria_network

  backend:
    build: ./backend
    container_name: malaria_backend
    environment:
      # LLM — Groq 
      - GROQ_API_KEY=${GROQ_API_KEY}

      # Redis — variables lues séparément par SessionManager
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0

      # RAG
      - VECTOR_STORE_PATH=/app/storage/faiss_index.idx

      # Frontend autorisé (CORS)
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:5173}

    ports:
      - "8000:8000"
    depends_on:
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - backend_reports:/app/reports
      - rag_storage:/app/storage
    networks:
      - malaria_network

networks:
  malaria_network:
    driver: bridge

volumes:
  backend_reports:
  rag_storage:
